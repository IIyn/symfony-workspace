services:

  web:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      - php
    networks:
      - php_network

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symfony
    volumes:
      - ./:/var/www/html
    networks:
      - php_network

networks:
  php_network:
    driver: bridge
